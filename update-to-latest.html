<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  
  <link rel="canonical" href="/update-fw.html">
  <meta http-equiv="refresh" content="0; url=/update-fw.html">
</head>

<body>
  <h1>Redirecting...</h1>
  <p>Page has moved. If you are not redirected automatically,
    <a href="/update-fw.html">click here</a>.
  </p>
  <script>
    var path = window.location.pathname;
    if (path.indexOf('/ru/') !== -1 || path.indexOf('/uk/') !== -1) {
      window.location.replace(path.replace(/\/(ru|uk)\//, '/') + window.location.search + window.location.hash);
    } else {
      window.location.replace("/update-fw.html");
    }
  </script>
</body>

</html>
