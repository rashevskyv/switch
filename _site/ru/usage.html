<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  
  <link rel="canonical" href="">
  <meta http-equiv="refresh" content="0; url=">
</head>

<body>
  <h1>Redirecting...</h1>
  <p>Page has moved. If you are not redirected automatically,
    <a href="">click here</a>.
  </p>
  <script>
    var path = window.location.pathname;
    if (path.indexOf('/ru/') !== -1 || path.indexOf('/uk/') !== -1) {
      window.location.replace(path.replace(/\/(ru|uk)\//, '/') + window.location.search + window.location.hash);
    } else {
      window.location.replace("");
    }
  </script>
</body>

</html>
