---
layout: null
---
<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  {% assign target = page.redirect_to | replace: '/ru/', '/' | replace: '/uk/', '/' %}
  <link rel="canonical" href="{{ target }}">
  <meta http-equiv="refresh" content="0; url={{ target }}">
</head>

<body>
  <h1>Redirecting...</h1>
  <p>Page has moved. If you are not redirected automatically,
    <a href="{{ target }}">click here</a>.
  </p>
  <script>
    var path = window.location.pathname;
    if (path.indexOf('/ru/') !== -1 || path.indexOf('/uk/') !== -1) {
      window.location.replace(path.replace(/\/(ru|uk)\//, '/') + window.location.search + window.location.hash);
    } else {
      window.location.replace("{{ target }}");
    }
  </script>
</body>

</html>
